name: CI
 
on:
  push:
    branches: [ main ]
  pull_request:
 
jobs:
 
  # ── 1. Compilación ──────────────────────────────────────────────────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress
  test:
     runs-on: ubuntu-latest
     needs: compile
     steps: # <-- lista de Steps del Job
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
              distribution: temurin
              java-version: "21"
              cache: maven
        - run: chmod +x mvnw
        - run: ./mvnw verify --no-transfer-progress
  standard-reports-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Basic Test Report
        uses: ./
        with:
          report-path: './ctrf-reports/ctrf-report.json'
          summary-report: true
          annotate: false
        if: always()
  github-report-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detailed Test Report
        uses: ./
        with:
          report-path: './ctrf-reports/ctrf-report.json'
          github-report: true
          annotate: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()
  detailed-reports-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Detailed Test Report
        uses: ./
        with:
          report-path: './ctrf-reports/ctrf-report.json'
          test-report: true
          test-list-report: true
          annotate: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()
  failed-reports-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Failed Test Reports
        uses: ./
        with:
          report-path: './ctrf-reports/ctrf-report.json'
          failed-report: true
          failed-folded-report: true
          annotate: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        if: always()