name: CI
 
on:
  push:
    branches: [ main ]
  pull_request:
 
jobs:
 
  # ── 1. Compilación ──────────────────────────────────────────────────────────
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
 
      - name: Compile
        run: ./mvnw compile --no-transfer-progress