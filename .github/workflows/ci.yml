name: CI
 
on:
  push:
    branches: [ main ]
  pull_request:
 
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar 
          path: target/*.jar 
      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress
  test:
     runs-on: ubuntu-latest
     needs: compile
     steps: 
        - uses: actions/checkout@v4
        - uses: actions/setup-java@v4
          with:
              distribution: temurin
              java-version: "21"
              cache: maven
        - run: chmod +x mvnw
        - run: ./mvnw verify --no-transfer-progress
  report:
    runs-on: ubuntu-latest
    needs: integration-test
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Install ctrf dependencies
        run: npm install

      - name: JUnit XML → CTRF
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './target/failsafe-reports/*.xml'
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf/ctrf-report.json",
                  "toolname": "maven-failsafe"
                }
              }
            }

      - name: Summary Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/ctrf-report.json'
          summary-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Failed Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/ctrf-report.json'
          failed-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: GitHub Report
        uses: ctrf-io/github-test-reporter@v1
        with:
          report-path: './ctrf/ctrf-report.json'
          github-report: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}