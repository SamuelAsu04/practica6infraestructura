name: Test
 
on:
  push:
    branches: [ main ]
  pull_request:
 
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress
  test:
     runs-on: ubuntu-latest
     needs: compile
     steps: 
        - uses: actions/checkout@v6
        - uses: actions/setup-java@v4
          with:
              distribution: temurin
              java-version: "21"
              cache: maven
        - run: chmod +x mvnw
        - run: ./mvnw verify --no-transfer-progress

        - name: Generar badge de cobertura
          uses: cicirello/jacoco-badge-generator@v2
          with:
            jacoco-csv-file: target/site/jacoco/jacoco.csv

        - name: Subir badge al repo
          uses: stefanzweifel/git-auto-commit-action@v5
          with:
            commit_message: "ci: actualizar badge de cobertura"
            file_pattern: ".github/badges/*.svg"