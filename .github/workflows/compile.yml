name: Compile
 
on:
  push:
    branches: [ main ]
  pull_request:
 
jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Give execute permission to mvnw
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw compile --no-transfer-progress